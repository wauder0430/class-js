    <h1>함수</h1>

    <input type="button" value="버튼1" name="btn1">
    <input type="button" value="버튼2" name="btn2">
    
    <script>
        /*
            JavaScript Function
            - "자바스크립트의 함수는 1급 객체(First-class Object)이다."
            - 함수를 객체처럼 취급한다. > 값으로 사용할 수 있다.(***)

            1. 함수를 변수나 데이터 구조에 담을 수 있다.(저장)
            2. 함수를 매개변수로 전달할 수 있다.
            3. 함수를 반환값으로 사용할 수 있다.

            JavaScript에서 함수를 선언하는 방법
            1. 함수 선언문
            2. 함수 표현식(= 리터럴)

        */   

        // 1. 함수 선언문
        // function m1() {
        //     alert('m1');
        // }
        // m1();
        
        // 2. 함수 표현식(= 리터럴)
        // - 이름이 없는 함수 = 익명 함수
        // (function () {
        //     alert('익명 함수1');
        // })(); // 즉시 호출(재사용 불가능)

        var f1 = function () {
            alert('익명 함수2');
        };
        // f1?
        // console.log(typeof f1);
        // f1();

        // var f2 = f1;
        // f2();

        // 함수 선언문(=실명 함수) 사용
        document.all['btn1'].onclick = m2;
        function m2() {
            alert('btn1');
        }

        // 함수 표현식(=익명 함수) 사용
        document.all['btn2'].onclick = function() {
            alert('btn2');
        }

        // console.log(typeof document.all['btn2'].onclick);

        }
        function f5(param) {
            param();
        }

        // f5(f4);
        // f5(function() {alert('익명함수');});
