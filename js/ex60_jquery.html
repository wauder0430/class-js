<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!-- ex60_jQuery.html -->
    <h1>jQuery() 함수</h1>

    <input type="button" value="버튼1" id="btn1" name="btn1">
    <hr>
    <div id="box1" class="box">상자1</div>
    <div id="box2" class="box">상자2</div>
    <div id="box3" class="box">상자3</div>
    
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        /* 
            jQuery 함수
            1. CSS 선택자(CSS1~CSS3)를 사용해서 태그를 검색한다.
            2. 자바스크립트 객체를 jQuery 객체로 변환한다.
            3. 동적으로 태그를 생성한다.

            jQuery 특징 
            1. jQuery()로 검색한 모든 결과는 항상 배열(컬렉션)이다.
            2. jQuery() 결과에 어떤 업무(함수)를 적용하면 > 자동으로 일괄 처리한다.(자동으로 루프를 돌면서 각각의 요소에 업무 적용한다.)
        
        */
        document.getElementById('btn1').onclick = m3;

        function m3() {
            const a = document.all.btn1; //BOM
            const b = document.getElementById('btn1'); //DOM
            const c = jQuery('#btn1'); //jQuery

            // alert(a === b); // true
            // a.title = '버튼'; // BOM 코드
            // a.setAttribute('title','버튼'); // DOM 코드

            // alert(a===c); // false

            // a.style['color'] = 'blue';
            // c.style['color'] ='blue';
            // a.value = 'Button';
            // c.value = 'Button'; 

            // c.css('color','gold');
            // a.css('color','gold');

            // BOM(DOM) 객체 > (변환) > jQUery객체
            jQuery(a).css('color', 'blue')
            
            // jQuery 객체 > (변환) > BOM(DOM) 객체
            c[0].style.color = 'gold';
        }


        function m2() {

            // alert(jQuery('.box').length);

            // const list = jQuery('.box');

            // for(let i=0; i<list.length; i++){
            //     list[i].style['color'] = orange;
            // }

            // 클래스 선택자
            // jQuery('.box').css('color', 'gold');

            // 태그 선택자
            // jQuery('div').css('color','red');

            // 아이디 선택자
            // jQuery('#box2').css('background-color', 'gold');

            jQuery('div:nth-child(even)').css('color', 'blue');
        }

        // 상자 3개 > CSS 조작
        function m1() {

            // document.getElementsByClassName()
            // document.querySelectorAll() < forEach 같이 출시

            Array.from(document.getElementsByClassName('box')).forEach(box => {
                // alert();
                box.style['color'] = 'gold';
            });
        }


        
    </script>
</body>
</html>
