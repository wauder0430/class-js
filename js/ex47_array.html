<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <!-- ex47_array.html -->
    <h1>배열</h1>
    
    <script>
        // 자바 스트림 > 유사
        const list = [
            '사과',
            '귤',
            '바나나',
            '포도',
            '딸기',
            '파인애플',
            '배',
            '수박',
            '복숭아',
            '망고'
        ];

        // 탐색
        // 1. 일반 for문
        // 2. 향상된 for문
        //     - for in > 프로퍼티 탐색
        //     - for of > 요소 탐색
        for(let item of list){
            console.log(item);
        }
        console.clear();

        // 자바의 컨슈머 매개변수는 있고 반환값은 없음
        list.forEach(function (item){
            console.log(item);
        });
        console.clear();

        list.forEach(item => console.log(item));
        console.clear();

        list.forEach((item, index) => console.log(item, index));
        console.clear();

        // map()
        // - 가공 + 변환
        console.log(list.map(item => item.length));
        console.clear();

        // filter()
        console.log(list.filter(item => item.length >= 3));
        console.clear();

        // find
        // - 요소 검색
        // - 조건 제시 > 만족하는 첫번째 요소 반환
        console.log(list.find(item => item.length >= 3));
        console.clear();


    </script>
</body>
</html>
