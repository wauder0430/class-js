<body>
    <!-- question12.html -->
    <h1>입력하기</h1>
    <table>
        <tr>
            <th>번호</th>
            <th>입력</th>
            <th>잠금</th>
        </tr>
        
        <tr>
            <td>1</td>
            <td><input type="text" name="txt1" class="txts"></td>
            <td><input type="checkbox" name="cb1" class="cbs"></td>
        </tr>
        <tr>
            <td>2</td>
            <td><input type="text" name="txt2" class="txts"></td>
            <td><input type="checkbox" name="cb2" class="cbs"></td>
        </tr>
        <tr>
            <td>3</td>
            <td><input type="text" name="txt3" class="txts"></td>
            <td><input type="checkbox" name="cb3" class="cbs"></td>
        </tr>
        <tr>
            <td>4</td>
            <td><input type="text" name="txt4" class="txts"></td>
            <td><input type="checkbox" name="cb4" class="cbs"></td>
        </tr>
        <tr>
            <td>5</td>
            <td><input type="text" name="txt5" class="txts"></td>
            <td><input type="checkbox" name="cb5" class="cbs"></td>
        </tr>
        <tr>
            <td>6</td>
            <td><input type="text" name="txt6" class="txts"></td>

        </tr>
        <tr>

        <tr>

        <tr>
            <td>9</td>

            <td><input type="checkbox" name="cb9" class="cbs"></td>
        </tr>
        <tr>
            <td>10</td>
            <td><input type="text" name="txt10" class="txts"></td>
            <td><input type="checkbox" name="cb10" class="cbs"></td>
        </tr>
    </table>
    <script>
        var txtlist = document.querySelectorAll('.txts')
        var btnlist = document.querySelectorAll('.cbs');
        for(let i=0; i<txtlist.length; i++){
            txtlist[i].ondblclick = function(event) {
                if(event.target.readOnly==true){
                    event.target.removeAttribute("readonly");
                    event.target.style.backgroundColor="#FFF";
                    btnlist[i].checked = false;
                } else {
                    event.target.setAttribute('readonly','readonly');
                    event.target.style.backgroundColor="#AAA";
                    btnlist[i].checked = true;
                }
            };
            btnlist[i].onchange = function(event) {
                if(btnlist[i].checked==false){
                    txtlist[i].removeAttribute("readonly");
                    txtlist[i].style.backgroundColor="#FFF";
                } else {
                    txtlist[i].setAttribute('readonly','readonly');
                    txtlist[i].style.backgroundColor="#AAA";
                }
            };

            
        }


    </script>
</body>
</html>
