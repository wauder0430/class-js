<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 { color: #555; }
        table {
            width: 700px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px 16px;
        }
        th {
            background-color: #e9e9e9;
            width: 150px;
            text-align: center;
            color: #555;
        }
        input[type="text"] {
            width: 80px;
        }
        #jumin2 {
            width: 100px;
        }
        #year { width: 60px; }
        #month, #day { width: 40px; }
    </style>
</head>
<body>
    <!-- question10.html -->
    <h1>회원가입</h1>
    <form name="form1">
        <table>
            <tr>
                <th>주민번호</th>
                <td>
                    <input type="text" name="jumin1" maxlength="6"> -
                    <input type="text" name="jumin2" id="jumin2" maxlength="7">
                </td>
            </tr>
            <tr>
                <th>생년월일</th>
                <td>
                    <input type="text" name="year" id="year"> 년
                    <input type="text" name="month" id="month"> 월
                    <input type="text" name="day" id="day"> 일
                </td>
            </tr>
            <tr>
                <th>성별</th>
                <td>
                    <label><input type="radio" name="gender" value="m"> 남자</label>
                    <label><input type="radio" name="gender" value="f"> 여자</label>
                </td>
            </tr>
        </table>
    </form>
    <script>
        var jumin1 = document.form1.jumin1;
        jumin1.onkeyup = m1;
        function m1() {
            if(jumin1.value.length == 6) {
                document.form1.year.value = "19"+jumin1.value.substring(0,2);
                document.form1.month.value = jumin1.value.substring(2,4);
                document.form1.day.value = jumin1.value.substring(4,6);
                document.form1.jumin2.focus();
            }
        }
        var jumin2 = document.form1.jumin2;
        jumin2.onkeyup = m2;
        function m2() {
            if(jumin2.value.length == 1) {
                if(jumin2.value == "1"){
                    document.form1.gender[0].checked = true;
                } else if(jumin2.value == "2"){
                    document.form1.gender[1].checked = true;
                }
            }
        }


    </script>
</body>
</html>
