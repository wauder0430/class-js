    <h1>호이스팅</h1>
    
    <script>

        /* 
            호이스팅, Hoisting
            - 함수 호이스팅 > 사용 O
                - 왜? 개발자가 코드 작성 > 자유도 향상
            - 변수 호이스팅 > 신경 X
                - var 사용시에만 발생
                - let/const 사용시에는 발생 X
                    - TDZ(Temporal Dead Zone) 배치
        */

        // 1. 함수 선언
        function m1() {
            alert('m1');
        }

        // 2. 함수 호출
        // m1();

        // m2();

        function m2() {
            alert('m2');
        }

        var a1;
        a1 = 10;
        console.log(a1);

        console.log(a2);
        var a2; 
        a2 = 20;
        
    </script>
