<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

</head>
<body>
    <!-- ex41_object.html -->
    <h1>객체</h1>

    
    <script>
        /* 

            ***********************

            객체, Object
            - 자바스크립트에는 클래스가 없다.
            - 하지만 내장객체를 제공한다.

            1. 내장 객체
            - Date, Array, Math, Number, Object, String
            - 자바스크립트가 미리 만들어서 제공하는 객체(~클래스)

            2. BOM 객체
            - window, document, form, txt, button 등..

            3. DOM 객체
            - element, attribute, text, comment 등..
            
            4. 사용자 정의 객체
            - 클래스가 없다.
            - 클래스가 없어도 사용자가 원하는 구조의 객체 생성 가능

            사용자 정의 객체 만들기
            1. Object 내장 객체를 사용

            2. {}, 객체 리터럴

            class User {
                public String name;
                public int age; 
                public String address;
            }
            
            User hong = new User();
            hong.name = "홍길동";
            hong.age = 20;
            hong.address = "서울시";

            자바스크립트의 Object 내장 객체
            
            자바의 
            class Test {
                // 아무것도 없음
            }
            Test t1 = new Test();
            t1.?
        */
        
        const hong = new Object();
        console.log(hong); // {}: 아무 멤버가 없는 비어있는 객체(빈 객체)

        // *** 자바스크립트의 모든 객체는 프로퍼티를 자유롭게 추가/삭제가 가능하다.
        hong.name = '홍길동'; // 이 순간 hong 객체 name 프로퍼티 추가
        hong.age = 20; 
        hong.address = '서울시';
        console.log(hong);

        delete hong.address; // 프로퍼티 삭제
        console.log(hong);

        // document.tel = '010-1234-5678';
        // console.log(document.tel);

        // 자바스크립트의 프로퍼티 표기법
        // - hong.tel
        // - hong['tel']
        hong.tel = '010-1234-5678';

        hong['tel'] = '010-1111-2222';
        console.log(hong);

        // hong.primary-phone = '010';
        hong['primary-phone'] = '010';
        console.log(hong);
        console.clear();

        // 동물 객체 생성하기
        // - 이름
        // - 나이
        // - 색상

        const dog = new Object();

        dog.name = '멍멍이';
        dog.age = 3;
        dog.color = '갈색';

        const cat = new Object();
        
        cat.name = '냐옹이';
        cat.age = 2;
        cat.colour = '고등어'; // < 실수로 낸 오타

        console.log(dog);
        console.log(cat);

        // 위 문제자 해결책
        // 1. 생성자 함수 > 처음부터~
        // 2. class > ES6

        // 자바스크립트 객체 만들기
        // 1. 빈 객체를 만든다.
        // 2. 원하는 프로퍼티를 추가한다.

        const lee = new Object(); // 빈 객체

        lee.name = '이순신';
        lee.age = 30;
        lee.address = '서울시';

        // const list1 = new Array();
        // const list2 = [];

        const park = {}; // 빈 객체 > 객체 리터럴
        park.name = '박문수';
        park.age = 25;
        park.address = '부산시';

        //{name: '멍멍이', age: 3, color: '갈색'}
        
        const gang = {
            name: '강감찬',
            age: 22,
            address: '인천시'
        };
        gang.tel = '010';
        console.log(gang);
        
        // 객체 출력(log)
        console.log(gang);
        console.dir(gang);
        console.table(gang);
        console.clear();

        console.log(window);
        console.dir(window);
        console.table(window);
        console.clear();

        // ----------------------------------------
        const user1 = {
            name: '홍길동',
            age: 20,
            address: '서울시 강남구 역삼동'
        };

        // X
        const user2 = {
            name: '홍길동',
            age: 20,
            si: '서울시',
            gu: '강남구',
            dong: '역삼동'
        };

        const address = {
            si: '서울시',
            gu: '강남구',
            dong: '역삼동'
        };

        const user3 = {
            name: '홍길동',
            age: 20,
            address: address
        };

        const user4 = {
            name: '홍길동',
            age: 20,
            address: {
                si: '서울시',
                gu: '강남구',
                dong: '역삼동'
            }
        };

        console.log(user4.name);
        console.log(user4.age);
        console.log(user4.address);
        console.log(user4.address.dong);
        console.log(user4['address']['dong']);

        const user5 = {
            name: '홍길동',
            age: 20,
            // nick: new Array( '바보', '멍청이')
            nick: ['바보', '멍청이']
        };
        console.log(user5.nick[0]);
        console.clear();

        // 객체 배열
        // Student[] list = new Student[3];

        const s1 = {
            name: '홍길동',
            age: 15
        };
        const s2 = {
            name: '아무개',
            age: 15
        };
        const s3 = {
            name: '하하하',
            age: 15
        };

        const slist1 = [];
        slist1[0] = s1;
        slist1[1] = s2;
        slist1[2] = s3;
        console.log(slist1);

        const slist2 = [];
        slist2.push(s1);
        slist2.push(s2);
        slist2.push(s3);
        console.log(slist2);

        const slist3 = [ s1, s2, s3 ];
        console.log(slist3);

        // 리터럴
        const slist4 = [
            {
                name: '홍길동',
                age: 20
            },
            {
                name: '아무개',
                age: 20
            },
            {
                name: '하하하',
                age: 20
            }
        ];
        console.clear();

        // 객체 = 데이터 + 행동
        const pig = {
            name: '꿀꿀이',
            age: 5,
            eat: function() {
                // alert('꿀꿀');
                alert('꿀꿀~ ' + this.name);
            }
        };

        console.log(pig.name);
        console.log(pig.age);
        // pig.eat();
        
        // <input type="button" onclick="m1(this);">

        pig.weight = 50;
        pig.run = function() {
            alert(this.name + ' 달린다~');
        }
        // pig.run();

        console.clear();

        function sleep() {
            //alert('쿨쿨~ ' + this.name); // 쿨쿨~ 꿀꿀이
            
            // this는 어떤 상황에서 함수가 호출되느냐에 따라 다른 의미
            // > 이 함수의 소유주 == this
            console.log(this);
        }


        pig.sleep = sleep;
        pig.sleep();
        // 객체에 함수를 쓸거면 익명함수 권장
        sleep();

    </script>
</body>
</html>
