<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <!-- ex32_content.html -->
    <h1>콘텐츠 조작</h1>
    <input type="button" value="버튼1" id="btn1">
    <input type="button" value="버튼2" id="btn2">
    <hr>
    <div id="div1" class="divs">홍길동</div>

    <script>
        /* 
            BOM/DOM
            1. 태그 검색(BOM, DOM)
            2. 속성 조작(BOM, DOM)
            3. 콘텐츠 조작(BOM(X), DOM(O))
            4. 이벤트 조작(BOM, DOM)
            5. CSS 조작(BOM(X), DOM(O))

            Content
            - 시작 태그와 끝 태그 사이의 내용물(PCDATA or Element)
            1. innerText
                - 시작 태그와 끝 태그 사이의 내용물을 읽기/쓰기
                - 내용물을 순수한 문자열 취급(파싱X, 태그 인식X)
                - 비표준(MS)
            2. innerHTML
                - 시작 태그와 끝 태그 사이의 내용물을 읽기/쓰기
                - 내용물을 구문으로 인식(태그 실행~)
                - 표준
            3. textContent
                - 시작 태그와 끝 태그 사이의 내용물을 읽기/쓰기
                - 내용물을 순수한 문자열 취급(파싱X, 태그 인식X)
                - 표준
            --------------------------------------
            4. outerText
            5. outerHTML
        
        */

        var div1 = document.getElementById('div1');

        document.getElementById('btn1').onclick = function() {
            // alert(div1.innerText);
            // div1.innerText = '아<u>무</u>개';

            // alert(div1.innerHTML);
            // div1.innerHTML = '아<u>무</u>개';

            // innerHTML > 동적으로 태그 생성하기
            // div1.innerHTML += '<input type="text">';
            div1.innerHTML += '<img src="images/catty01.png" class="imgs">';
        };

        document.getElementById('btn2').onclick = function() {
            div1.innerHTML = '';
        };

    </script>
</body>
</html>
