        function m4(){

        function m1() {
            // me > 검색 >

            // (친)자식 탐색
            // -me.childNodes
            // alert(me.childNodes.length); //9

            for(var i=0; i<me.childNodes.length; i++){
                // console.log(me.childNodes[i]);
                /* 
                    DOM 노드 타입***
                    - 태그(1)
                    - 속성(2)
                    - PCDATA(3)
                    -----------
                    - 주석(8)
                    - 선언문(13)
                    ...

                    DOM 노드 프로퍼티
                    1. nodeType > 어떤 종류

                                    - 태그(태그명-대문자) **
                                    - 속성(속성명-대문자) **
                                    - PCDATA(#text)
                                    - 주석(#comment)
                    3. nodeValue > 노드 값

                                    - 속성(속성값)  **
                                    - PCDATA(문자열)**

                */ 
                // console.log('nodeType', me.childNodes[i].nodeType);
                //console.log('nodeName', me.childNodes[i].nodeName);
                // console.log('nodeValue', me.childNodes[i].nodeValue); 

                if(me.childNodes[i].nodeType == 1){
                    me.childNodes[i].className = 'check';
                }

            }
