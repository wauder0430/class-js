<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form input {
            display: block;
            padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <!-- ex31_dom.html -->
    <h1>DOM</h1>
    

    <form action="" name="form1">
        <input type="text" name="txt1" id="txt1" class="txts">
        <input type="text" name="txt2" id="txt2" class="txts">
        <input type="text" name="txt3" id="txt3" class="txts">
        <input type="button" value="버튼1" name="btn1" id="btn1">
    </form>
    
    <script>
        /* 
            1. BOM, Browser Object Model
                - 트리 구조
                - 고정된 트리 + 일부 태그 조작
                - 제공된 기능 부족
                - DOM Level 0(공식X)

            2. DOM, Document Object Model
                - 트리 구조
                - 문서 내용을 기반으로 하는 동적 트리
                    + 모든 태그 조작
                - 제공된 기능 풍부

            DOM
            - BOM > name 식별자만 사용 가능
            - DOM > name, id, class 등 > 태그 식별 방식이 다양
            - CSS 조작 가능
            - PCDATA 조작 가능
            - DOM Level 1 > DOM Level 2 > DOM Level 3

            BOM의 최상위 객체 > window
            DOM의 최상위 객체 > document

            태그 검색 도구(BOM)
            1. 트리 구조 기반 > name 검색
            2. 내장 배열 > name or index 검색

            태그 검색 도구(DOM)
            1. id 검색    > document.getElementById('id')
            2. class 검색 > document.getElementsByClassName('class');
            3. name 검색  > document.getElementsByName('name');
            4. 태그명 검색> document.getElementsByTagName('tag');
            5. CSS 선택자 검색
                - ES6 추가(2014년) > 이전까지는 각종 라이브러리(jQuery)
                - document.querySelector('CSS 선택자');
                - document.querySelectorAll('CSS 선택자');
        */

        document.form1['btn1'].onclick = function() {
            // <input type="text" name="txt1" id="txt1" class="txts">

            // BOM
            window.document.form1.txt1.value = 'BOM';

            // DOM(id)
            document.getElementById('txt1').value= 'DOM';

            // BOM or DOM > 검색 결과 > 동일한 객체
            console.log(document.form1.txt1 === document.getElementById('txt1'));

            // DOM(class)
            var txts = document.getElementsByClassName('txts');
            console.log(txts);

            for(var i=0; i<txts.length; i++){
                txts[i].value = i;
            }

            // DOM(name) > 잘 안씀 BOM호환성
            txt1 = document.getElementsByName('txt1')[0];
            txt1.value = 'DOM(name)';

            // DOM(tag) > 잘 안쓴다.
            // var input = document.getElementsByTagName('input');
            // for(var i=0; i<input.length; i++) {
            //     input[i].value = i;
            // }

            // CSS 선택자
            document.querySelector('#txt1').value = 'CSS';
            document.querySelector('.txts:nth-child(2)').value = 'CSS2';

            var list = document.querySelectorAll('.txts');

            for(var i=0; i<list.length; i++){
                list[i].value = i;
            }

            console.clear();
            console.log(document.form1.txt1 === document.getElementById('txt1'));
            
            console.log(document.form1.txt1 === document.querySelector('#txt1'));
        };
    </script>
</body>
</html>
