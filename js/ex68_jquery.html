<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
    <style>
        #list1 .ui-selected {
            background-color: gold;
        }

        #member img {
            opacity: .3;
            cursor: pointer;
        }

        #member img:hover {
            opacity: .5;
        }

        #member img.ui-selected {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- ex68_jquery.html -->
    <h1>Interactions <small>Selectable</small></h1>
    
    <ul id="list1">
        <li>강아지</li>
        <li>고양이</li>
        <li>병아리</li>
        <li>돼지</li>
        <li>타조</li>
    </ul>

    <h1>팀원 구성</h1>
    <div id="member">
        <img src="images/man_01.png" alt="">
        <img src="images/man_02.png" alt="">
        <img src="images/man_03.png" alt="">
        <img src="images/woman_01.png" alt="">
        <img src="images/woman_02.png" alt="">
        <img src="images/woman_03.png" alt="">
    </div>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
    
    <script>
        $('#list1').selectable();

        $('#member').selectable();
    </script>
</body>
</html>
