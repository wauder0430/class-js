<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <!-- ex43_closure.html -->
    <h1>클로저</h1>
    <input type="button" value="버튼1" id="btn1">
    <input type="button" value="버튼2" id="btn2">
    
    <script>

        // 전역 함수
        function outer() {
            
            // 지역 변수(outer)
            let a = 10;
            console.log('a', a);

            // 지역 함수(outer)
            function inner() {

                // 지역 변수(inner)
                let b = 20;
                console.log('a', a);
                console.log('b', b);
            }
            inner();
        }
        //outer();
        // inner();

        // 클로저
        // - 내부 함수가 외부 함수의 지역 변수를 기억하는 함수
        // - 렉시컬 환경 > 외부 함수의 지역 변수 저장
        let n1 = 10; //전역 변수
        
        document.getElementById('btn1').onclick = function() {
            console.log('n1', n1);

            let n2 = 20; // 지역 변수(btn1.onclick)
            console.log('n2', n2);
            
            document.getElementById('btn2').onclick = function() {
                // alert();
                let n3 = 30; // 지역 변수(btn2.onclick)
                console.log('n1', n1); // O
                console.log('n2', n2); // O > ***** 이상한 코드
                console.log('n3', n3); // O

                // 대다수 언어 > 렉시컬 환경의 변수 > 읽기 전용
                // 자바스크립트는 수정 가능
                // n2 = 200; 
                // console.log('n2', n2);
                
            }
        }

    </script>
</body>
</html>
