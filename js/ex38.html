<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        #tbl1 { border: 1px solid black; border-collapse: collapse;}
        #tbl1 td {
            border:1px solid black; width:100px; height:100px;
        }
    </style>
</head>
<body>
    <!-- ex38.html -->
    <h1>문제 풀이용</h1>

    <table id="tbl1">
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>

        </tr>
        <tr>

        <tr>
            <td></td>

            <td></td>
            <td></td>
        </tr>
    </table>
    
    <script>
        var list = document.querySelectorAll('#tbl1 td');
        var index = 0;

        list[index].bgColor = 'gold';

        window.onkeydown = function(event) {

            
            
            if(event.key == 'ArrowRight'){
                list[index].bgColor = 'transparent';
                index++;
                
                if(index >= list.length){
                    index = 0;
                }
                list[index].bgColor = 'gold';
            } else if(event.key == 'ArrowLeft'){
                list[index].bgColor = 'transparent';
                index--;
                if(index < 0){
                    index++;
                }
                list[index].bgColor = 'gold';
            }
        }
        
    </script>
</body>
</html>
