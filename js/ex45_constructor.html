<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>
<body>
    <!-- ex45_constructor.html -->
    <h1></h1>
    
    <script>
        // 객체 생성
        const o1 = new Object();
        const o2 = new Array();
        const o3 = new Date();

        // 생성자 함수(=클래스)
        // - 역할: 멤버 초기화
        // - 역할: 클래스 역할 대신

        /* 
            class User {
                private String name;
                private int age;

                public User(String name, int age) {
                    this.name = name;
                    this.age = age;
                }
            }
            
            User hong = new User("홍길동", 20)
        */

        // 생성자 함수
        // - 일반 함수
        // 1. 함수명을 파스칼 표기법으로 작성한다.(관습적)
        // 2. 생성자 함수는 일반 함수처럼 호출하면 안된다.
        // - 반드시 new 연산자와 같이 사용한다.

        function User(name, age) {
            // 구조 생성(클래스 역할) + 멤버 초기화(생성자 역할)
            this.name = name;
            this.age = age;
        }
        
        // User('홍길동', 20);
        
        // 1. new 실행 > new Object() 호출 > { } 빈객체 생성
        // 2. 생성자 함수 
        const u1 = new User('홍길동', 20);
        console.log(u1);

        
    </script>
</body>
</html>
