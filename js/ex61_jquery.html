<body>
    <!-- ex61jQuery.html -->
    <h1>jQuery Event</h1>

    <input type="button" value="버튼1" id="btn1" class="btns">
    <input type="button" value="버튼2" id="btn2" class="btns">
    <input type="button" value="버튼3" id="btn3" class="btns"> 

    
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script>
        /* 
            1. BOM
            - <input onclick="">
            - btn.onclick = fn
            - btn.onclick = null

            2. DOM
            - btn.addEventListener('click', fn)
            - btn.removeEventListener('click', fn)

            3. jQuery
            - 이벤트 함수
                3.1 전용함수
                    - 객체.이벤트함수(콜백 함수)
                3.2 범용함수
                    - 객체.on(이벤트명, 콜백 함수)
                    - 객체.off(이벤트명)
        */

        /* 
            function aaa() {
            }
            aaa();

            const b= aaa;
            b();

            function jQuery() {
            }
            jQuery();

            const $ = jQuery;
            $();
        */

        // jQuery('#btn1');

        /* 
        // 전용 함수 (onclick > click)
        $('#btn1').click(() => {
            alert();
        });

        // 범용 함수
        $('#btn2').on('click', () => {
            alert();
        });

        // 이벤트 제거
        $('#btn3').on('click', () => {
            $('#btn1').off('click');
            $('#btn2').off('click');
        }); 
        */

        // 버튼 3개 > 동일한 클릭 이벤트
        /* 
        document.querySelectorAll('.btns').forEach(btn => {
            btn.onclick = event => {
                alert(event.target.value);
            }
        });
        */

        $('.btns').click(()=>{
            alert(event.target.value);
        });

    </script>
</body>
</html>
