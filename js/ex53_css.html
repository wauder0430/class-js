<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width:150px; height: 150px; left: 0px; top:0px;
        }
        #box1 { background-color: tomato; position: absolute;}
        #box2 { background-color: orange;  position: absolute;}
        #box3 { background-color: gold; position: absolute;}
        #box4 { background-color: yellowgreen; position: absolute;}
        #box5 { background-color: dodgerblue; position: absolute;}
    </style>
</head>
<body>
    <!-- ex53_css.html -->
    
    <div id="box1" class="box">상자1</div>
    <div id="box2" class="box">상자2</div>
    <div id="box3" class="box">상자3</div>
    <div id="box4" class="box">상자4</div>
    <div id="box5" class="box">상자5</div>
    
    <script>
        
        const box5 = document.getElementById('box5');

        /* 
        window.onmousedown = event => {
            // 클릭한 좌표? > 상자 이동
            // event.x 
            // event.clientX
            // event.screenX
            // event.offsetX

            box5.style['left'] = event.clientX+'px';
            box5.style['top'] = event.clientY+'px';

        }; 
        */

        const list = document.getElementsByClassName('box');
        let index = 0;
        let zindex = 1;

        window.onmousedown = event => {
            list[index].style['left'] = event.clientX - 75 +'px';
            list[index].style['top'] = event.clientY - 75 +'px';
            list[index].style['z-index'] = zindex;

            index++;
            zindex++;

            if(index >= list.length) index = 0;

        };

    </script>
</body>
</html>
